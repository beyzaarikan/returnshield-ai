services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: returnshield
      POSTGRES_PASSWORD: returnshield123
      POSTGRES_DB: returnshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U returnshield -d returnshield"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://returnshield:returnshield123@db:5432/returnshield}
      DEBUG: ${DEBUG:-true}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./outputs:/outputs
    command: >-
      sh -c "alembic upgrade head && python seed.py &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    image: nginx:alpine
    restart: always
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
