services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: returnshield
      POSTGRES_PASSWORD: returnshield123
      POSTGRES_DB: returnshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://returnshield:returnshield123@db:5432/returnshield
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ./outputs:/outputs
    env_file:
      - ./backend/.env

volumes:
  postgres_data: